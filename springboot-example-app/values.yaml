# Spring Boot Example Application Values
# This demonstrates the application-k8s.tpl template for Spring Boot applications

# Global configuration
global:
  # Global labels applied to all resources
  labels:
    environment: production
    team: platform
    cost-center: engineering
    managed-by: helm

  # Global annotations applied to all resources
  annotations:
    contact: platform-team@example.com
    repository: https://github.com/example/springboot-app
    version: "1.0.0"

# Application configuration
environment: production
replicaCount: 3

image:
  repository: springboot-app
  pullPolicy: IfNotPresent
  tag: "1.0.0"

# Service configuration
service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

# Ingress configuration
ingress:
  enabled: false
  hosts: []

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Auto-scaling configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Pod configuration
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "metrics"
  prometheus.io/path: /actuator/prometheus

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Service account configuration
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/springboot-app-role

# ConfigMap configuration for application-k8s.tpl
# This data structure is used by the application-k8s.tpl template
configmap:
  enabled:
    datasource: true
    redis: true
    management: true
    app: true
    server: true
  name: springboot-config
  data:
    database:
      host: postgres.example.com
      port: 5432
    cache:
      host: redis.example.com
      port: 6379
    app:
      env: production
      log_level: info
      feature_flags:
        enabled: true
        new_ui: false
  labels:
    component: config

# Secret configuration
secret:
  enabled: true
  name: springboot-secret
  type: Opaque
  stringData:
    database.username: app_user
    database.password: changeme
  labels:
    component: secret

# Database configuration (for reference, actual values should be managed externally)
database:
  password: changeme

# API configuration (for reference, actual values should be managed externally)
api:
  key: changeme

# Deployment configuration
deployment:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  revisionHistoryLimit: 10
  containers:
    - name: app
      image: springboot-app:1.0.0
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: management
          containerPort: 8081
          protocol: TCP
      env:
        - name: ENVIRONMENT
          value: production
        - name: LOG_LEVEL
          value: info
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: springboot-example-app-secret
              key: database.username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: springboot-example-app-secret
              key: database.password
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 512Mi
      livenessProbe:
        httpGet:
          path: /actuator/health
          port: management
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /actuator/health/readiness
          port: management
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 3
      startupProbe:
        httpGet:
          path: /actuator/health
          port: management
        initialDelaySeconds: 0
        periodSeconds: 5
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 30
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: config
          mountPath: /etc/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: config
      configMap:
        name: springboot-example-app-config
    - name: tmp
      emptyDir: {}
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations:
    - key: workload
      operator: Equal
      value: application
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - springboot-example-app
            topologyKey: kubernetes.io/hostname

# Istio configuration
istio:
  enabled: true
  destinationRule:
    enabled: true
    host: springboot-example-app.production.svc.cluster.local
    trafficPolicy:
      loadBalancer:
        simple: LEAST_CONN
      connectionPool:
        tcp:
          maxConnections: 100
        http:
          http1MaxPendingRequests: 50
          http2MaxRequests: 100
      outlierDetection:
        consecutiveErrors: 5
        interval: 30s
        baseEjectionTime: 30s
        maxEjectionPercent: 50
    subsets:
      - name: v1
        labels:
          version: v1
      - name: v2
        labels:
          version: v2
  gateway:
    enabled: true
    selector:
      istio: ingressgateway
    servers:
      - port:
          number: 80
          name: http
          protocol: HTTP
        hosts:
          - springboot-app.example.com
        tls:
          httpsRedirect: true
      - port:
          number: 443
          name: https
          protocol: HTTPS
        hosts:
          - springboot-app.example.com
        tls:
          mode: SIMPLE
          credentialName: springboot-app-example-tls
  virtualService:
    enabled: true
    hosts:
      - springboot-app.example.com
    gateways:
      - springboot-example-app-gateway
    http:
      - match:
          - uri:
              prefix: /
        route:
          - destination:
              host: springboot-example-app
              port:
                number: 80
              subset: v1
            weight: 100
        timeout: 30s
        retries:
          attempts: 3
          perTryTimeout: 10s
          retryOn: 5xx,gateway-error,connect-failure,refused-stream

# Notes configuration
notes:
  enabled: true
  includeCommon: true
  includeResources: true
  includeNetworking: true
  includeIstio: true
  includeMattermost: true
  includeTroubleshooting: true
  customNotes:
    documentation: https://docs.example.com/springboot
    slack_channel: "#platform-apps"
    on_call: platform-oncall

# Mattermost configuration
mattermost:
  enabled: false
  webhookUrl: "https://mattermost.example.com/hooks/xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  channel: "deployments"
  username: "Helm"
  iconUrl: "https://example.com/helm-icon.png"
