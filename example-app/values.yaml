# Example Application Values
# This demonstrates all features of the Helm Templates library

# Global configuration
global:
  # Global labels applied to all resources
  labels:
    environment: "{{ .Values.environment }}"
    team: platform
    cost-center: engineering
    managed-by: helm
  
  # Global annotations applied to all resources
  annotations:
    contact: platform-team@example.com
    repository: https://github.com/example/app
    version: "{{ .Chart.AppVersion }}"

# Application configuration
environment: production
replicaCount: 3

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.25"

# Service configuration
service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: app-example-tls
      hosts:
        - app.example.com

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Auto-scaling configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Pod configuration
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "metrics"
  prometheus.io/path: /metrics

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Service account configuration
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/example-app-role

# ConfigMap configuration
configmap:
  enabled: true
  name: app-config
  data:
    app.env: "{{ .Values.environment }}"
    app.log_level: info
    app.feature_flags.enabled: "true"
    app.feature_flags.new_ui: "false"
    database.host: postgres.example.com
    database.port: "5432"
    cache.host: redis.example.com
    cache.port: "6379"
  labels:
    component: config

# Secret configuration
secret:
  enabled: true
  name: app-secret
  type: Opaque
  stringData:
    database.username: app_user
    database.password: "{{ .Values.database.password }}"
    api.key: "{{ .Values.api.key }}"
  labels:
    component: secret

# Database configuration (for reference, actual values should be managed externally)
database:
  password: changeme

# API configuration (for reference, actual values should be managed externally)
api:
  key: changeme

# Deployment configuration
deployment:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  revisionHistoryLimit: 10
  containers:
    - name: app
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
      env:
        - name: ENVIRONMENT
          value: "{{ .Values.environment }}"
        - name: LOG_LEVEL
          value: "{{ .Values.configmap.data.app.log_level }}"
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "names.fullName" $ }}-config
              key: database.host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "names.fullName" $ }}-config
              key: database.port
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "names.fullName" $ }}-secret
              key: database.username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "names.fullName" $ }}-secret
              key: database.password
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
      livenessProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /ready
          port: http
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 3
      startupProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 0
        periodSeconds: 5
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 30
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      volumeMounts:
        - name: config
          mountPath: /etc/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: config
      configMap:
        name: {{ include "names.fullName" $ }}-config
    - name: tmp
      emptyDir: {}
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations:
    - key: workload
      operator: Equal
      value: application
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - {{ .Chart.Name }}
            topologyKey: kubernetes.io/hostname

# Istio configuration
istio:
  enabled: true
  destinationRule:
    enabled: true
    host: "{{ include "names.fullName" $ }}.{{ .Release.Namespace }}.svc.cluster.local"
    trafficPolicy:
      loadBalancer:
        simple: LEAST_CONN
      connectionPool:
        tcp:
          maxConnections: 100
        http:
          http1MaxPendingRequests: 50
          http2MaxRequests: 100
      outlierDetection:
        consecutiveErrors: 5
        interval: 30s
        baseEjectionTime: 30s
        maxEjectionPercent: 50
    subsets:
      - name: v1
        labels:
          version: v1
      - name: v2
        labels:
          version: v2
  gateway:
    enabled: true
    selector:
      istio: ingressgateway
    servers:
      - port:
          number: 80
          name: http
          protocol: HTTP
        hosts:
          - app.example.com
        tls:
          httpsRedirect: true
      - port:
          number: 443
          name: https
          protocol: HTTPS
        hosts:
          - app.example.com
        tls:
          mode: SIMPLE
          credentialName: app-example-tls
  virtualService:
    enabled: true
    hosts:
      - app.example.com
    gateways:
      - {{ include "names.fullName" $ }}-gateway
    http:
      - match:
          - uri:
              prefix: /
        route:
          - destination:
              host: {{ include "names.fullName" $ }}
              port:
                number: {{ .Values.service.port }}
              subset: v1
            weight: 100
        timeout: 30s
        retries:
          attempts: 3
          perTryTimeout: 10s
          retryOn: 5xx,gateway-error,connect-failure,refused-stream

# Notes configuration
notes:
  enabled: true
  includeCommon: true
  includeResources: true
  includeNetworking: true
  includeIstio: true
  includeTroubleshooting: true
  customNotes:
    documentation: https://docs.example.com
    slack_channel: "#platform-apps"
    on_call: platform-oncall
