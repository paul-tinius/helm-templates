# Values for files-configmap-example
# This example demonstrates using the _files-configmap.tpl template
# to create a ConfigMap with multiple file configurations

global:
  labels: {}

notes:
  enabled: true
  includeCommon: false
  includeResources: false
  includeNetworking: false
  includeIstio: false
  includeMattermost: false
  includeTroubleshooting: false
  includeCustom: false
  includeDatabase: false
  includeSecurity: false

serviceAccount:
  create: false

filesConfigmap:
  name: "app-config"
  component: "application"
  files:
    - name: "application-k8s.yaml"
      content:
        application:
          name: "my-app"
          version: "1.0.0"
          environment: "production"
        server:
          port: 8080
          host: "0.0.0.0"
        logging:
          level: "info"
          format: "json"
    - name: "agentconfig-k8s.yaml"
      content:
        agent:
          enabled: true
          name: "monitoring-agent"
          version: "2.1.0"
        metrics:
          interval: 30s
          retention: 7d
          endpoints:
            - "/metrics"
            - "/health"
        tracing:
          enabled: true
          sampler: 0.1
    - name: "dbprop-k8s.yaml"
      content:
        database:
          driver: "postgresql"
          host: "db.example.com"
          port: 5432
          name: "mydb"
          pool:
            min: 5
            max: 20
            timeout: 30s
        credentials:
          username: "app_user"
          # In production, use secrets instead of plain text
          # password: "secret-password"
